name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'

      - run: npm ci

      # Build first: the TanStack Router Vite plugin writes
      # src/routeTree.gen.ts as a side effect. The file is gitignored, so
      # on a fresh checkout typecheck would fail with "Cannot find module
      # './routeTree.gen'". Running the production build first generates
      # the route tree AND validates the bundle in one shot, so we avoid
      # a separate generator step or a duplicate build.
      - run: npm run build

      - run: npm run typecheck

      - run: npm test

      - run: npm audit --omit=dev

      # Browser smoke tests — chromium only, runs the SPA against the
      # Vite dev server with VITE_AUTH_DISABLED=1 (no Supabase
      # credentials required). Covers app-shell render, deep-route
      # refresh, login + reset-password pages, PDF/Excel upload UIs,
      # and the Excel export menu. ~10s total.
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - run: npm run test:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
