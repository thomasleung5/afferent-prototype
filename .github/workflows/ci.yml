name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'

      - run: npm ci

      # Build first: the TanStack Router Vite plugin writes
      # src/routeTree.gen.ts as a side effect. The file is gitignored, so
      # on a fresh checkout typecheck would fail with "Cannot find module
      # './routeTree.gen'". Running the production build first generates
      # the route tree AND validates the bundle in one shot, so we avoid
      # a separate generator step or a duplicate build.
      - run: npm run build

      - run: npm run typecheck

      - run: npm test

      # Temporary exception: the only outstanding production audit finding
      # is the known `xlsx` advisory (no fix available upstream). Keep the
      # step non-blocking so CI surfaces the report without failing PRs;
      # tighten this once we migrate off xlsx or upstream ships a patch.
      - name: npm audit (production) — non-blocking until xlsx is replaced
        continue-on-error: true
        run: npm audit --omit=dev
