<style>
  :root{
    /* Paper ladder — warm, low-chroma. Body sits BELOW cards. */
    --canvas:      #f7f5f1;   /* page background (darker) */
    --paper:       #fcfbf8;   /* cards (lighter than canvas) */
    --paper-2:     #f1eee7;   /* table headers, subtle bands */
    --paper-3:     #e8e4db;   /* placeholders, deep wells */
    --rule:        #d8d4cc;
    --rule-strong: #bfbab0;

    /* Ink — ONE authoritative navy at the top. */
    --ink:         #1d2236;   /* primary text + navy */
    --ink-2:       #3a3f53;
    --ink-3:       #6f6e74;   /* secondary text */
    --ink-4:       #a8a6ab;

    /* Accent collapsed to navy. No separate indigo. */
    --accent:      #1d2236;
    --accent-2:    #1d2236;
    --accent-tint: #ebe8df;   /* warm tint, not blue */

    /* Brand semantic tokens — ONE navy. Charcoal aliased to navy. */
    --navy:        #1d2236;
    --navy-line:   #3a3f53;
    --navy-sub:    #c8c5bd;
    --navy-dim:    #a8a6ab;
    --charcoal:    #1d2236;

    /* Signal — muted, never SaaS-bright. */
    --neg:         #8a3a36;
    --neg-tint:    #f3e7e3;
    --warn:        #9a7f55;   /* muted amber-gray */
    --warn-tint:   #f1ebde;
    --pos:         #6b7355;   /* muted olive */
    --pos-tint:    #ebeadb;

    --fs-ui: 13px;
    --ff-display: "Inter Tight", system-ui, sans-serif;
    --ff-ui: "IBM Plex Sans", system-ui, sans-serif;
    --ff-mono: "IBM Plex Mono", ui-monospace, monospace;

    /* Type scale — single source of truth.
       L1 headline answer · L2 metric · L3 secondary · L4 eyebrow · L5 page title
       L6 lead · L7 body · L8 micro · L9 tag */
    --t-l1: 56px;     --t-l1-w: 600;
    --t-l2: 36px;     --t-l2-w: 600;
    --t-l3: 22px;     --t-l3-w: 600;
    --t-l4: 10.5px;   --t-l4-w: 600;
    --t-l5: 22px;     --t-l5-w: 600;
    --t-l6: 13.5px;   --t-l6-w: 400;
    --t-l7: 12.5px;   --t-l7-w: 400;
    --t-l8: 11px;     --t-l8-w: 400;
    --t-l9: 10px;     --t-l9-w: 700;

    /* Spacing scale (px) */
    --s-1: 4px;   --s-2: 8px;   --s-3: 12px;
    --s-4: 16px;  --s-5: 22px;  --s-6: 24px;
    --s-7: 32px;  --s-8: 40px;

    /* Page geometry */
    --page-max:  1320px;
    --page-padX: 32px;
    --section-gap: 24px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--canvas); color:var(--ink); font-family:var(--ff-ui); font-size:var(--fs-ui); -webkit-font-smoothing:antialiased; }
  button{ font:inherit; color:inherit; background:none; border:0; cursor:pointer; padding:0; }
  input, select{ font:inherit; color:inherit; }
  ::selection{ background: var(--accent-tint); }
  .mono{ font-family:var(--ff-mono); font-feature-settings:"tnum" 1, "zero" 1; }
  .num{ font-family:var(--ff-mono); font-feature-settings:"tnum" 1, "zero" 1; }
  .display{ font-family: var(--ff-display); letter-spacing: -0.02em; }

  /* Page shell — every screen wraps with this */
  .page{
    max-width: var(--page-max);
    margin: 0 auto;
    padding: var(--s-6) var(--page-padX) var(--s-8);
    display: flex; flex-direction: column;
    gap: var(--section-gap);
  }
  /* Section eyebrow + rule (output mode) */
  .sec-eyebrow{
    font-family: var(--ff-mono);
    font-size: var(--t-l4); font-weight: var(--t-l4-w);
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-3);
    padding-top: var(--s-5); margin-bottom: var(--s-4);
    border-top: 1px solid var(--rule);
  }
  .sec-eyebrow:first-child{ border-top: none; padding-top: 0; }
</style>
